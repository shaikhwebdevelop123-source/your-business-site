<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financial Services Website</title>
  <style>
    /* ====== COLOR THEME ====== */
    :root {
      --primary-color: #1a237e; /* Change main header/nav color */
      --secondary-color: #f5f5f5; /* Background color */
      --accent-color: #e53935; /* Buttons/highlights */
      --text-color: #333333; /* Default text */
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: var(--secondary-color);
      color: var(--text-color);
    }

    header {
      background-color: var(--primary-color);
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background-color: var(--accent-color);
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .hero {
      padding: 60px;
      text-align: center;
      background: linear-gradient(to right, var(--primary-color), var(--accent-color));
      color: white;
    }

    .hero h2 {
      margin-bottom: 20px;
    }

    .content {
      padding: 40px;
      text-align: center;
    }

    .content h3 {
      color: var(--primary-color);
    }

    .footer {
      background-color: var(--primary-color);
      color: white;
      text-align: center;
      padding: 15px;
    }
  </style>
</head>
<body>

  <!-- ====== CHANGE COMPANY NAME HERE ====== -->
  <header>
    <h1>My Finance Company</h1>
    <p>Trusted Partner in Wealth Creation</p>
  </header>

  <nav>
    <!-- ====== CHANGE MENU ITEMS HERE ====== -->
    <a href="#">Home</a>
    <a href="#">Markets</a>
    <a href="#">Services</a>
    <a href="#">Research</a>
    <a href="#">Contact</a>
  </nav>

  <section class="hero">
    <!-- ====== CHANGE HERO TEXT HERE ====== -->
    <h2>Welcome to My Finance Company</h2>
    <p>Empowering investors with insights and tools.</p>
  </section>

  <section class="content">
    <!-- ====== CHANGE CONTENT HERE ====== -->
    <h3>Our Services</h3>
    <p>Equity Trading, Mutual Funds, Wealth Advisory, and more.</p>
  </section>

  <footer class="footer">
    <!-- ====== CHANGE FOOTER TEXT HERE ====== -->
    <p>&copy; 2026 My Finance Company. All rights reserved.</p>
  </footer>

</body>
</html>
